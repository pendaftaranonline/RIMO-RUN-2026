<script>

/* ===== FINALL UPGRADE V2 ===== */
const STORAGE_KEY='run2026_form';
function saveFormData(){
 const data={};
 ['nama','jk','tempat','tanggal','identitas','noidentitas','email','wa','alamat','kategori','bib','size'].forEach(id=>{
  const el=document.getElementById(id); if(el) data[id]=el.value;
 });
 localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}
function loadFormData(){
 try{
  const data=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
  Object.keys(data).forEach(id=>{
   const el=document.getElementById(id);
   if(el) el.value=data[id];
  });
 }catch(e){}
}
window.addEventListener('load',()=>{
 loadFormData();
 validateStep1();
 validateStep2();
});
document.querySelectorAll('input,select,textarea').forEach(el=>{
 el.addEventListener('input',saveFormData);
 el.addEventListener('change',saveFormData);
});
window.addEventListener('beforeunload',saveFormData);

document.getElementById('submitBtn').addEventListener('click',()=>{
 setTimeout(()=>localStorage.removeItem(STORAGE_KEY),1000);
});

document.getElementById('noidentitas').addEventListener('input',function(){
 this.value=this.value.replace(/[^A-Za-z0-9]/g,'');
});

document.getElementById('wa').setAttribute('inputmode','numeric');

</script>

  <script>

/* =========================
   TIMER 10 MENIT
========================= */

let timeLeft = 600;

const timer = document.getElementById("timer");

const countdown = setInterval(() => {

let minutes = Math.floor(timeLeft / 60);
let seconds = timeLeft % 60;

timer.innerHTML =
String(minutes).padStart(2,"0")
+ ":"
+
String(seconds).padStart(2,"0");

if(timeLeft <= 0){

clearInterval(countdown);

window.location.href = "failed.html";

}

timeLeft--;

},1000);


/* =========================
   STEP CONTROL
========================= */

function showStep(step){

document.querySelectorAll(".step")
.forEach(el=>el.classList.remove("active"));

document.getElementById(
"step"+step
).classList.add("active");

document.querySelectorAll(".step-indicator")
.forEach(el=>el.classList.remove("active"));

document.getElementById(
"i"+step
).classList.add("active");

}

function prevStep(){
const activeStep=document.querySelector('.step.active')?.id || 'step2';
if(activeStep==='step3'){ showStep(2); }
else { showStep(1); }
}


/* =========================
   VALIDASI STEP 1
========================= */

const step1Fields = [

"nama",
"jk",
"tempat",
"tanggal",
"identitas",
"noidentitas",
"email",
"wa",
"alamat"

];

function validateStep1(){

let valid = true;

step1Fields.forEach(id=>{

if(
!document.getElementById(id).value.trim()
){
valid = false;
}

});

document.getElementById("next1")
.disabled = !valid;

}

step1Fields.forEach(id=>{

document
.getElementById(id)
.addEventListener(
"input",
validateStep1
);

document
.getElementById(id)
.addEventListener(
"change",
validateStep1
);

});


/* =========================
   STEP 2
========================= */

const step2Fields = [

"kategori",
"bib",
"size"

];

function validateStep2(){

let valid = true;

step2Fields.forEach(id=>{

if(
!document.getElementById(id).value.trim()
){
valid = false;
}

});

document.getElementById("next2")
.disabled = !valid;

}

step2Fields.forEach(id=>{

document
.getElementById(id)
.addEventListener(
"input",
validateStep2
);

document
.getElementById(id)
.addEventListener(
"change",
validateStep2
);

});


/* =========================
   NEXT STEP
========================= */

document
.getElementById("next1")
.addEventListener("click",()=>{

showStep(2);

});

document
.getElementById("next2")
.addEventListener("click",()=>{

showStep(3);

buildSummary();

});


/* =========================
   SUMMARY DATA
========================= */

function buildSummary(){

const html = `

<b>Nama Lengkap :</b>
${nama.value}
<br><br>

<b>Jenis Kelamin :</b>
${jk.value}
<br><br>

<b>Tempat/Tanggal Lahir :</b>
${tempat.value},
${tanggal.value}
<br><br>

<b>Identitas :</b>
${identitas.value}
<br><br>

<b>Nomor Identitas :</b>
${noidentitas.value}
<br><br>

<b>Email :</b>
${email.value}
<br><br>

<b>Whatsapp :</b>
${wa.value}
<br><br>

<b>Alamat :</b>
${alamat.value}
<br><br>

<b>Category :</b>
${kategori.value}
<br><br>

<b>Nama BIB :</b>
${bib.value}
<br><br>

<b>Size Jersey :</b>
${size.value}

`;

document.getElementById(
"summaryBox"
).innerHTML = html;

}


/* =========================
   SUBMIT VALIDATION
========================= */

const bukti =
document.getElementById("bukti");

const agree =
document.getElementById("agree");

const submitBtn =
document.getElementById("submitBtn");

function validateSubmit(){

if(
bukti.files.length > 0
&&
agree.checked
){

submitBtn.classList.add("active");

}else{

submitBtn.classList.remove("active");

}

}

bukti.addEventListener(
"change",
validateSubmit
);

agree.addEventListener(
"change",
validateSubmit
);



bukti.addEventListener("change",function(){
const file=this.files[0];
if(file && file.type.startsWith("image/")){
const reader=new FileReader();
reader.onload=function(e){
const p=document.getElementById("previewBukti");
p.src=e.target.result;
p.style.display="block";
};
reader.readAsDataURL(file);
}
});


function isValidWA(number){
 const clean=number.replace(/\D/g,'');
 return /^(08|628)[0-9]{8,13}$/.test(clean);
}
function isValidEmail(email){
 return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}
document.getElementById("bib").addEventListener("input",function(){
 this.value=this.value.toUpperCase();
});

const originalValidateStep1 = validateStep1;
validateStep1 = function(){
 let valid=true;
 step1Fields.forEach(id=>{
   if(!document.getElementById(id).value.trim()) valid=false;
 });
 if(!isValidEmail(document.getElementById("email").value.trim())) valid=false;
 if(!isValidWA(document.getElementById("wa").value.trim())) valid=false;
 document.getElementById("next1").disabled=!valid;
};

bukti.addEventListener("change",function(){
 const file=this.files[0];
 if(!file) return;
 const allowed=["image/jpeg","image/png","application/pdf"];
 if(!allowed.includes(file.type)){
   alert("Hanya JPG, PNG atau PDF");
   this.value="";
   return;
 }
 if(file.size>5*1024*1024){
   alert("Maksimal ukuran file 5 MB");
   this.value="";
   return;
 }
});

document.getElementById("next1").addEventListener("click",()=>window.scrollTo({top:0,behavior:"smooth"}));
document.getElementById("next2").addEventListener("click",()=>window.scrollTo({top:0,behavior:"smooth"}));

submitBtn.addEventListener("click",function(){
 if(submitBtn.dataset.locked==="1") return;
 submitBtn.dataset.locked="1";
 submitBtn.disabled=true;
 submitBtn.innerHTML="MEMPROSES...";
});

/* =========================
   EMAILJS PLACEHOLDER
========================= */

function sendEmail(){

emailjs.send(

"service_gpt8taq",

"template_u6ud97k",

{
nama:nama.value,
email:email.value,
whatsapp:wa.value,
kategori:kategori.value,
bib:bib.value,
size:size.value
}

)
.then(function(){

console.log(
"Email berhasil dikirim"
);

})
.catch(function(error){

console.log(error);

});

}


/* =========================
   SUBMIT
========================= */

submitBtn.addEventListener(
"click",
function(){

if(
!bukti.files.length
||
!agree.checked
){

return;

}

sendEmail();

document.getElementById(
"loadingScreen"
).style.display="flex";

setTimeout(()=>{

window.location.href = "success.html";

},3000);

});




</script>

<style>
.progress-bar-wrap{height:10px;background:rgba(255,255,255,.1);border-radius:999px;margin:10px 0 20px;overflow:hidden}
.progress-bar-fill{height:100%;width:33%;transition:.3s}
</style>
<script>
window.addEventListener('load',()=>{
 const progress=document.createElement('div');
 progress.className='progress-bar-wrap';
 progress.innerHTML='<div id="progressFill" class="progress-bar-fill"></div>';
 document.querySelector('.progress')?.after(progress);

 const updateProgress=()=>{
   let step=1;
   if(document.getElementById('step2')?.classList.contains('active')) step=2;
   if(document.getElementById('step3')?.classList.contains('active')) step=3;
   document.getElementById('progressFill').style.width=(step*33.33)+'%';
 };
 setInterval(updateProgress,300);

 const tgl=document.getElementById('tanggal');
 if(tgl){
   tgl.addEventListener('change',()=>{
      const age=Math.floor((Date.now()-new Date(tgl.value))/31557600000);
      if(age<5){ alert('Usia peserta terlalu muda'); tgl.value=''; }
   });
 }

 const oldSendEmail=window.sendEmail;
 if(typeof oldSendEmail==='function'){
   window.sendEmail=function(){
      try{ oldSendEmail(); }catch(e){ console.error(e); }
   }
 }

 const submit=document.getElementById('submitBtn');
 if(submit){
   submit.addEventListener('click',()=>{
      const reg='RUN'+Date.now().toString().slice(-8);
      sessionStorage.setItem('nomor_registrasi',reg);
   });
 }
});
</script>

<script>
(function(){
const qs=id=>document.getElementById(id);
const email=qs('email'); const wa=qs('wa');
if(email){email.setAttribute('autocomplete','email')}
if(wa){wa.setAttribute('maxlength','15')}
['nama','tempat','bib'].forEach(id=>{const e=qs(id); if(e){e.addEventListener('blur',()=>e.value=e.value.trim())}});
const oldShow=window.showStep;
window.showStep=function(step){oldShow(step); const p=qs('progressFill'); if(p) p.style.width=(step*33.33)+'%';};
})();
</script>
