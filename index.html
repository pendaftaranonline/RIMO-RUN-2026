<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rimo Run 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:Poppins,sans-serif;color:#fff;overflow-x:hidden;background:#000}
video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:-2}
.overlay{position:fixed;inset:0;background:rgba(0,40,20,.55);backdrop-filter:blur(2px);z-index:-1}
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:30px}
.card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:24px;padding:24px;max-width:520px;text-align:center;animation:up 1s}
.card img{width:100%;border-radius:18px;box-shadow:0 0 30px rgba(0,255,120,.35)}
h1{margin:18px 0 10px;font-size:42px}
p{opacity:.9}
.btns{margin-top:20px;display:flex;gap:15px;justify-content:center;flex-wrap:wrap}
a{padding:14px 22px;border-radius:999px;text-decoration:none;color:#fff;background:#00a651;transition:.3s}
a:hover{transform:scale(1.08)}
#count{font-size:28px;font-weight:700;margin-top:18px}
@keyframes up{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:none}}

#loadingScreen{position:fixed;inset:0;background:linear-gradient(135deg,#003b22,#00a651);display:flex;justify-content:center;align-items:center;z-index:99999;opacity:0;visibility:hidden;transition:.4s}
#loadingScreen.show{opacity:1;visibility:visible}
.loader-box{text-align:center}.loader-ring{width:90px;height:90px;border:8px solid rgba(255,255,255,.15);border-top:8px solid #fff;border-radius:50%;animation:spin 1s linear infinite;margin:auto auto 25px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<video autoplay muted loop playsinline>
<source src="video.mp4" type="video/mp4">
</video>
<div class="overlay"></div>
<section class="hero">
<div class="card">
<img src="poster.jpg" alt="Poster Rimo Run">
<h1>Rimo Run 6.2K</h1>
<p>04 Juli 2026 • 06.30 WITA • Kantor Pusat Bank NTB Syariah</p>
<div id="count"></div>
<div class="btns">
<a href="#" id="registerBtn">Daftar Sekarang</a>
<a href="#">Download Rimo</a>
</div>
</div>
</section>

<div id="loadingScreen"><div class="loader-box"><div class="loader-ring"></div><h2>Mempersiapkan Form Registrasi</h2><p>Mohon tunggu sebentar...</p></div></div>
<script>
const t=new Date("2026-07-04T06:30:00+08:00");
setInterval(()=>{
let d=t-new Date();
if(d<0){count.innerHTML="EVENT DIMULAI";return;}
let day=Math.floor(d/86400000);
let h=Math.floor(d%86400000/3600000);
let m=Math.floor(d%3600000/60000);
let s=Math.floor(d%60000/1000);
count.innerHTML=`${day} Hari ${h} Jam ${m} Menit ${s} Detik`;
},1000);

document.getElementById('registerBtn').onclick=function(e){e.preventDefault();document.getElementById('loadingScreen').classList.add('show');setTimeout(()=>location.href='form.html',3000);};
</script>
</body>
</html>
