<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pendaftaran Gagal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(
135deg,
#7f1d1d,
#450a0a
);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

color:white;

}

.card{

max-width:700px;

width:100%;

background:rgba(255,255,255,.08);

backdrop-filter:blur(15px);

padding:50px;

border-radius:25px;

text-align:center;

border:1px solid rgba(255,255,255,.1);

}

.icon{

font-size:90px;

margin-bottom:20px;

}

h1{

font-size:38px;

margin-bottom:20px;

color:#fca5a5;

}

p{

font-size:18px;

line-height:1.8;

color:#f8fafc;

margin-bottom:15px;

}

.btn{

display:inline-block;

margin-top:20px;

padding:15px 35px;

background:#f97316;

color:white;

text-decoration:none;

border-radius:15px;

font-weight:700;

transition:.3s;

}

.btn:hover{

transform:translateY(-3px);

}

@media(max-width:768px){

.card{

padding:30px;

}

h1{

font-size:28px;

}

p{

font-size:16px;

}

}

</style>

</head>
<body>

<div class="card">

<div class="icon">
⏰
</div>

<h1>
WAKTU PENDAFTARAN HABIS
</h1>

<p>

Sistem mendeteksi bahwa waktu pengisian formulir telah melebihi batas maksimum 10 menit.

</p>

<p>

Untuk menjaga validitas data pendaftaran, formulir telah ditutup secara otomatis.

</p>

<p>

Silakan lakukan pendaftaran ulang dari awal.

</p>

<a href="form.html" class="btn">

Daftar Ulang

</a>

</div>

</body>
</html>
